<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Housing for All — Homes England</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; }

nav {
  background: #0F172A;
  height: 56px;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.nav-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.nav-logo {
  width: 32px;
  height: 32px;
  background: #1D4ED8;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.nav-logo-icon {
  width: 18px;
  height: 18px;
  border: 2px solid white;
  border-radius: 3px;
  position: relative;
}

.nav-title {
  font-size: 16px;
  font-weight: 700;
  color: white;
  letter-spacing: -0.3px;
}

.nav-subtitle {
  font-size: 13px;
  color: #64748B;
  font-weight: 400;
  margin-left: 4px;
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.nav-badge {
  font-size: 11px;
  background: rgba(29,78,216,0.2);
  color: #93C5FD;
  border: 1px solid rgba(29,78,216,0.3);
  border-radius: 4px;
  padding: 3px 9px;
  font-weight: 600;
  letter-spacing: 0.3px;
}

.nav-user {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 6px 12px;
  cursor: pointer;
}

.nav-user-name {
  font-size: 13px;
  color: #CBD5E1;
}

.nav-avatar {
  width: 24px;
  height: 24px;
  background: #1D4ED8;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  color: white;
}

.nav-status {
  width: 8px;
  height: 8px;
  background: #22C55E;
  border-radius: 50%;
}
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <div class="nav-logo">
      <div class="nav-logo-icon"></div>
    </div>
    <div>
      <span class="nav-title">Housing for All</span>
      <span class="nav-subtitle">/ Homes England · National Investment Intelligence</span>
    </div>
  </div>
  <div class="nav-right">
    <span class="nav-badge">NHB INVESTMENT OFFICER</span>
    <div class="nav-user">
      <div class="nav-avatar">JO</div>
      <span class="nav-user-name">James Owusu</span>
      <div class="nav-status"></div>
    </div>
  </div>
</nav>

</body>
</html>
