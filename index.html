<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Housing for All — Homes England</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #F8FAFC; }

/* NAV */
nav {
  background: #0F172A;
  height: 56px;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.nav-left { display: flex; align-items: center; gap: 12px; }
.nav-logo { width: 32px; height: 32px; background: #1D4ED8; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.nav-logo-icon { width: 18px; height: 18px; border: 2px solid white; border-radius: 3px; }
.nav-title { font-size: 16px; font-weight: 700; color: white; letter-spacing: -0.3px; }
.nav-subtitle { font-size: 13px; color: #64748B; font-weight: 400; margin-left: 4px; }
.nav-right { display: flex; align-items: center; gap: 10px; }
.nav-badge { font-size: 11px; background: rgba(29,78,216,0.2); color: #93C5FD; border: 1px solid rgba(29,78,216,0.3); border-radius: 4px; padding: 3px 9px; font-weight: 600; }
.nav-user { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 6px 12px; cursor: pointer; }
.nav-user-name { font-size: 13px; color: #CBD5E1; }
.nav-avatar { width: 24px; height: 24px; background: #1D4ED8; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: white; }
.nav-status { width: 8px; height: 8px; background: #22C55E; border-radius: 50%; }

/* TOOLBAR */
.toolbar {
  background: white;
  border-bottom: 1px solid #E2E8F0;
  height: 48px;
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.search-box {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #F8FAFC;
  border: 1px solid #E2E8F0;
  border-radius: 8px;
  padding: 6px 12px;
  width: 240px;
}
.search-icon {
  font-size: 14px;
  color: #94A3B8;
}
.search-box input {
  border: none;
  background: none;
  font-size: 13px;
  color: #0F172A;
  outline: none;
  width: 100%;
}
.search-box input::placeholder { color: #94A3B8; }
.sep { width: 1px; height: 24px; background: #E2E8F0; margin: 0 4px; }
.tbtn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 12px;
  border-radius: 7px;
  border: 1px solid #E2E8F0;
  background: white;
  font-size: 12px;
  font-weight: 500;
  color: #475569;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.tbtn:hover { background: #F8FAFC; }
.tbtn.on { background: #0F172A; color: white; border-color: #0F172A; }
.legend {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-left: auto;
  font-size: 11px;
  color: #64748B;
}
.legend-item { display: flex; align-items: center; gap: 4px; }
.ldot { width: 10px; height: 10px; border-radius: 50%; }
.live-tag {
  font-size: 10px;
  color: #64748B;
  background: #F1F5F9;
  border: 1px solid #E2E8F0;
  border-radius: 5px;
  padding: 2px 8px;
  margin-left: 8px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.live-dot { width: 6px; height: 6px; background: #22C55E; border-radius: 50%; }
</style>
